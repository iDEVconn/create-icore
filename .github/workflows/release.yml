name: Release

# On push to main, changesets/action opens / refreshes a "Version Packages"
# PR. When that PR merges (no pending changesets), the action runs
# `changeset publish` which publishes @idevconn/create-icore to npm.
#
# Provenance attestation is OFF for now because the GitHub repo is
# private — npm requires a PUBLIC source repo for sigstore provenance
# verification (E422 otherwise). Flip `NPM_CONFIG_PROVENANCE` to `'true'`
# below once the repo is made public.
#
# `workflow_dispatch` stays available as a manual override (e.g. retry
# a failed publish without an extra commit).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Enable corepack
        run: corepack enable
      - name: Install
        run: yarn install --immutable
      - name: Build CLI
        run: yarn nx build create-icore
      - name: Clean deprecated npm config
        run: |
          npm config delete always-auth --location=user 2>/dev/null || true
          npm config delete always-auth --location=project 2>/dev/null || true
          rm -f .npmrc
      - name: Ensure npm has OIDC trusted publishing support
        run: npm install -g npm@latest
      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npx changeset publish --access public
          version: npx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Flip to 'true' once the GitHub repo is public; npm rejects
          # private-repo provenance bundles with E422.
          NPM_CONFIG_PROVENANCE: 'false'
      - name: Trigger sync-main-to-dev workflow
        if: steps.changesets.outputs.published == 'true' || steps.changesets.outputs.hasChangesets == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run sync-main-to-dev.yml --ref main
