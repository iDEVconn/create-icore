name: Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  detect-affected:
    name: Detect affected projects
    runs-on: ubuntu-latest
    outputs:
      has-affected: ${{ steps.affected.outputs.has-affected }}
      projects: ${{ steps.affected.outputs.projects }}
      buildable: ${{ steps.affected.outputs.buildable }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: nrwl/nx-set-shas@v5
      - name: Compute affected
        id: affected
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PROJECTS=$(yarn nx show projects --json 2>/dev/null || echo '[]')
            BUILDABLE=$(yarn nx show projects --with-target=build --json 2>/dev/null || echo '[]')
          else
            PROJECTS=$(yarn nx show projects --affected --json 2>/dev/null || echo '[]')
            BUILDABLE=$(yarn nx show projects --affected --with-target=build --json 2>/dev/null || echo '[]')
          fi

          {
            echo "projects<<EOF"
            echo "$PROJECTS"
            echo "EOF"
            echo "buildable<<EOF"
            echo "$BUILDABLE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$PROJECTS" = "[]" ]; then
            echo "has-affected=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-affected=true" >> "$GITHUB_OUTPUT"
          fi

  check:
    name: Check (${{ matrix.task }})
    needs: [detect-affected]
    if: needs.detect-affected.outputs.has-affected == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [lint, test, 'format:check']
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: nrwl/nx-set-shas@v5
      - name: Run ${{ matrix.task }}
        run: |
          if [ "${{ matrix.task }}" = "format:check" ]; then
            yarn format:check
          else
            yarn nx affected -t ${{ matrix.task }} --parallel
          fi

  build:
    name: Build ${{ matrix.project }}
    needs: [check, detect-affected]
    if: |
      always() && !cancelled() &&
      needs.check.result != 'failure' &&
      needs.detect-affected.outputs.has-affected == 'true' &&
      needs.detect-affected.outputs.buildable != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.detect-affected.outputs.buildable) }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: nrwl/nx-set-shas@v5
      - name: Build ${{ matrix.project }}
        run: yarn nx build ${{ matrix.project }}
      - name: Upload dist
        if: github.ref == 'refs/heads/main' && hashFiles(format('apps/{0}/dist/**', matrix.project)) != ''
        uses: actions/upload-artifact@v5
        with:
          name: dist-${{ matrix.project }}
          path: |
            apps/**/dist
            libs/**/dist
            tools/**/dist
          if-no-files-found: ignore
          retention-days: 7

  # Layer A scaffold smoke — generate a real project from the templates snapshot
  # and TYPECHECK it (tsc --noEmit). Catches the "strip produced text that does
  # not compile" class (TS2304, dangling refs, bad pruning) that the unit tests
  # on the strip regexes can't see. Cheap: no install, reuses node_modules.
  # Heavier install+build+RUN fidelity lives in scaffold-smoke-matrix.yml.
  scaffold-smoke:
    name: Scaffold smoke (${{ matrix.combo.name }})
    needs: [detect-affected]
    if: needs.detect-affected.outputs.has-affected == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        combo:
          - name: supabase
            flags: --auth=supabase --db=supabase --upload=cloudinary --transport=tcp
          - name: firebase
            flags: --auth=firebase --db=firebase --upload=firebase --transport=tcp
          - name: nats
            flags: --auth=supabase --db=supabase --upload=supabase --transport=nats
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Build CLI + snapshot templates
        run: |
          yarn nx build create-icore
          node tools/create-icore/scripts/snapshot-templates.mjs
      - name: Scaffold + typecheck
        run: |
          node tools/create-icore/scripts/smoke-scaffold.mjs \
            ${{ matrix.combo.flags }} --mode=link \
            --projects=shared,firebase-admin,auth,upload,notes,api

  docker-build:
    name: Docker build (${{ matrix.image }})
    needs: [check]
    if: |
      always() && !cancelled() && needs.check.result != 'failure' &&
      (github.ref == 'refs/heads/main' || github.base_ref == 'main')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [gateway, ms-auth, ms-upload, ms-jobs]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.${{ matrix.image }}
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
