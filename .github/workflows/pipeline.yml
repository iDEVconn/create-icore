name: Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  detect-affected:
    name: Detect affected projects
    runs-on: ubuntu-latest
    outputs:
      has-affected: ${{ steps.affected.outputs.has-affected }}
      projects: ${{ steps.affected.outputs.projects }}
      buildable: ${{ steps.affected.outputs.buildable }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: nrwl/nx-set-shas@v5
      - name: Compute affected
        id: affected
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PROJECTS=$(yarn nx show projects --json 2>/dev/null || echo '[]')
            BUILDABLE=$(yarn nx show projects --with-target=build --json 2>/dev/null || echo '[]')
          else
            PROJECTS=$(yarn nx show projects --affected --json 2>/dev/null || echo '[]')
            BUILDABLE=$(yarn nx show projects --affected --with-target=build --json 2>/dev/null || echo '[]')
          fi

          {
            echo "projects<<EOF"
            echo "$PROJECTS"
            echo "EOF"
            echo "buildable<<EOF"
            echo "$BUILDABLE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$PROJECTS" = "[]" ]; then
            echo "has-affected=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-affected=true" >> "$GITHUB_OUTPUT"
          fi

  check:
    name: Check (${{ matrix.task }})
    needs: [detect-affected]
    if: needs.detect-affected.outputs.has-affected == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [lint, test, 'format:check']
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: nrwl/nx-set-shas@v5
      - name: Run ${{ matrix.task }}
        run: |
          if [ "${{ matrix.task }}" = "format:check" ]; then
            yarn format:check
          else
            yarn nx affected -t ${{ matrix.task }} --parallel
          fi

  build:
    name: Build ${{ matrix.project }}
    needs: [check, detect-affected]
    if: |
      always() && !cancelled() &&
      needs.check.result != 'failure' &&
      needs.detect-affected.outputs.has-affected == 'true' &&
      needs.detect-affected.outputs.buildable != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.detect-affected.outputs.buildable) }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: nrwl/nx-set-shas@v5
      - name: Build ${{ matrix.project }}
        run: yarn nx build ${{ matrix.project }}
      - name: Upload dist
        if: github.ref == 'refs/heads/main' && hashFiles(format('apps/{0}/dist/**', matrix.project)) != ''
        uses: actions/upload-artifact@v5
        with:
          name: dist-${{ matrix.project }}
          path: |
            apps/**/dist
            libs/**/dist
            tools/**/dist
          if-no-files-found: ignore
          retention-days: 7

  docker-build:
    name: Docker build (${{ matrix.image }})
    needs: [check]
    if: always() && !cancelled() && needs.check.result != 'failure'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [gateway, ms-auth, ms-upload, ms-jobs]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.image }}
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
