name: Setup
description: Set up Node + yarn 4 + cache
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Enable corepack
      shell: bash
      run: corepack enable
    - name: Cache yarn
      uses: actions/cache@v4
      with:
        path: |
          .yarn/cache
          .yarn/install-state.gz
          node_modules
        key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
        restore-keys: |
          yarn-${{ runner.os }}-
    - name: Install
      shell: bash
      run: yarn install --immutable
